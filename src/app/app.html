<a href="#main-content" class="skip-link">Skip to main content</a>

<header class="app-header">
  <div class="container app-header__inner">
    <a routerLink="/" class="app-header__brand">
      <img src="/book.png" alt="" class="app-header__logo" aria-hidden="true">
      Book Collections
    </a>
    <nav class="app-header__nav" aria-label="Main navigation">
      <a routerLink="/collections" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: false }">Collections</a>
      <a routerLink="/books" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: false }">Books</a>
    </nav>
  </div>
</header>

<main id="main-content" class="app-main">
  <router-outlet />
</main>
